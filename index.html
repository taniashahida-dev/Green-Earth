<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./index.css" />
  </head>
  <body class="w-11/12 mx-auto">
    <h1 class="text-green-400 font-bold text-5xl text-center my-10">
      Choose Your Trees
    </h1>
    <main class="grid grid-cols-4 gap-3">
      <section class="col-span-1 card card-body shadow">
        <h1 class="font-bold text-4xl text-center mb-2.5">Categories</h1>
        <button onclick="selectCategory(), loadPlant()"
          class="btn w-full text-white bg-green-400 mb-2.5 "
          id="trees-btn"
        >
          All Trees
        </button>
        <div id="Categories-container" class="space-y-4 ">

        </div>

      

      </section>

      <section class="col-span-2">
        <div class="grid grid-cols-3 gap-2.5 p-3" id="plants-container"></div>

        <div id="loading-spinner" class="hidden flex justify-center my-6">
          <span class="loading loading-spinner loading-xl"></span>
        </div>
      </section>

  <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="modal" class="modal modal-bottom sm:modal-middle rounded-sm p-1">
  <div class="modal-box ">
   <div id="modal-container" class="space-y-2">
      
 
     

   </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>

      <section class="col-span-1">
        <h1 class="font-bold text-4xl">Cart</h1>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
